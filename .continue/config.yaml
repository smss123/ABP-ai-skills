      ## Core ABP Principles

      1. Layered architecture: Domain → Application → Infrastructure (EF Core) → Web (Razor Pages)
      2. Never expose entities — always use DTOs
      3. Business logic in entities and domain services, not application services
      4. Application services orchestrate — call domain services/repositories, map to DTOs
      5. Protected/private setters on entity properties
      6. Always use IGuidGenerator — never Guid.NewGuid()
      7. ConfigureByConvention() is mandatory in EF Core model configuration
      8. Permissions defined in Application.Contracts, checked in app services and pages

      ## Available slash prompts

      - "scaffold crud <EntityName>" → generate all layers of a CRUD feature
      - "scaffold entity <EntityName>" → generate domain entity + repository interface + domain service
      - "scaffold domain-service <EntityName>" → generate only the Manager domain service class
      - "scaffold repository <EntityName>" → generate repository interface + EF Core implementation
      - "scaffold app-service <EntityName>" → generate DTOs + app service interface + implementation
      - "scaffold permissions <EntityName>" → generate permission constants + definition provider
      - "scaffold specification <EntityName> <CriteriaName>" → generate a Specification<T> class
      - "scaffold background-worker <WorkerName>" → generate background job or periodic worker
      - "scaffold razor-page <EntityName>" → generate Razor Pages UI (list + create/edit modals)
      - "scaffold data-seed <EntityName>" → generate an IDataSeedContributor
      - "scaffold event-bus <EntityName> <EventName>" → generate ETO + event handler
      - "scaffold multi-tenancy <EntityName>" → add IMustHaveTenant and ICurrentTenant usage
      - "scaffold settings <FeatureName>" → generate SettingDefinitionProvider + read/write code
      - "scaffold caching <EntityName>" → generate cache item class + IDistributedCache usage
      - "review abp code" → review the current file or selection for ABP convention violations
